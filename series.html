<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gistvox Series Player</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #eef3f9;
  --card-top: #d5e3f1;
  --card-bottom: #9ebacf;
  --accent: #102132;
  --muted: rgba(16, 33, 50, 0.65);
  --line: rgba(16, 33, 50, 0.14);
  --button-bg: #ffffff;
  --button-text: #102132;
  --shadow: rgba(89, 121, 149, 0.25);
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: transparent;
  color: var(--accent);
  padding: 80px 60px;
  opacity: 0;
  transition: opacity 0.2s ease-in;
}
body.loaded { opacity: 1; }

.series-player {
  width: 100%;
  max-width: 960px;
  background: linear-gradient(180deg, var(--card-top) 0%, var(--card-bottom) 100%);
  border-radius: 28px;
  box-shadow: 0 25px 60px var(--shadow);
  margin: 0 auto;
}

.series-header {
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 32px 40px;
}

.series-cover {
  width: 220px;
  height: 220px;
  border-radius: 18px;
  background: linear-gradient(145deg, #84aecd, #bcd4e6);
  box-shadow: 0 18px 36px rgba(70, 107, 138, 0.35);
  overflow: hidden;
  flex-shrink: 0;
}

.series-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.series-cover.no-image {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  color: #ffffff;
}

.series-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.series-label {
  text-transform: uppercase;
  letter-spacing: 4px;
  font-size: 12px;
  color: var(--muted);
}

.series-title {
  font-size: clamp(32px, 4vw, 60px);
  font-weight: 800;
  letter-spacing: -1px;
}

.series-creator {
  font-size: 20px;
  color: var(--muted);
}

.series-description {
  font-size: 15px;
  color: var(--muted);
  max-width: 520px;
  line-height: 1.5;
  margin: 8px 0;
}

.series-meta {
  font-size: 14px;
  color: var(--muted);
}

.series-actions {
  margin-top: 20px;
  display: flex;
  gap: 16px;
  align-items: center;
}

.save-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 999px;
  padding: 12px 22px;
  background: var(--button-bg);
  color: var(--button-text);
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 12px 26px rgba(158, 186, 207, 0.35);
  transition: transform 0.2s ease;
}

.save-btn:hover { transform: translateY(-1px); }

.plus-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--button-text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  line-height: 1;
}

.open-btn {
  margin-left: auto;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.35);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.open-btn img {
  width: 24px;
  height: 24px;
  object-fit: contain;
}

.player-bar {
  margin: 0 40px;
  padding: 28px 0;
  border-top: 1px solid var(--line);
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: center;
}

.player-meta {
  flex: 1 1 220px;
}

.player-meta-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
}

.now-playing-title {
  font-size: 18px;
  font-weight: 600;
}

.now-playing-artist {
  font-size: 14px;
  color: var(--muted);
}

.player-controls {
  flex: 2 1 320px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.ghost-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  transition: background 0.2s ease;
}

.ghost-btn:hover {
  background: rgba(255, 255, 255, 0.35);
  color: var(--accent);
}

.ghost-btn svg {
  width: 18px;
  height: 18px;
}

.progress-container {
  flex: 1;
  cursor: pointer;
}

.progress-track {
  width: 100%;
  height: 6px;
  border-radius: 999px;
  background: rgba(16, 33, 50, 0.15);
  position: relative;
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  border-radius: 999px;
  background: var(--accent);
  transition: width 0.1s ease;
}

.time-row {
  display: flex;
  gap: 8px;
  font-size: 12px;
  font-family: 'Roboto Mono', monospace;
  color: var(--muted);
  margin-top: 4px;
}

.dots-btn {
  background: none;
  border: none;
  color: var(--muted);
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 999px;
}

.play-circle {
  width: 66px;
  height: 66px;
  border-radius: 50%;
  border: none;
  background: #fff;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 18px 30px rgba(0, 0, 0, 0.35);
  cursor: pointer;
  margin-left: auto;
}

.play-circle svg { width: 20px; height: 20px; }

.chapter-list {
  padding: 12px 0 28px;
  max-height: 360px;
  overflow-y: auto;
}

.chapter-list::-webkit-scrollbar {
  width: 6px;
}

.chapter-list::-webkit-scrollbar-thumb {
  background: rgba(16, 33, 50, 0.2);
  border-radius: 999px;
}

.chapter-list-header {
  display: grid;
  grid-template-columns: 50px 1fr 90px;
  padding: 0 40px 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
}

.chapter-item {
  display: grid;
  grid-template-columns: 50px 1fr 90px;
  padding: 18px 40px;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.2s ease;
}

.chapter-item + .chapter-item {
  border-top: 1px solid var(--line);
}

.chapter-item:hover {
  background: rgba(255, 255, 255, 0.4);
}

.chapter-item.playing {
  background: rgba(255, 255, 255, 0.55);
}

.chapter-number {
  font-size: 16px;
  color: var(--muted);
}

.chapter-item.playing .chapter-number {
  color: var(--accent);
}

.chapter-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chapter-subtitle {
  font-size: 14px;
  color: var(--muted);
}

.chapter-duration {
  font-size: 14px;
  text-align: right;
  color: var(--muted);
  font-family: 'Roboto Mono', monospace;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 32px;
  transform: translate(-50%, 20px);
  background: rgba(0, 0, 0, 0.82);
  padding: 12px 18px;
  border-radius: 999px;
  color: #fff;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
}

.loading, .error {
  color: var(--accent);
  font-size: 16px;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255, 255, 255, 0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.player-bar.hidden { display: none; }

/* Store Buttons */
.store-buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.store-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 8px 20px rgba(16, 33, 50, 0.25);
}

.store-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(16, 33, 50, 0.35);
}

.store-btn svg {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
}

.store-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.store-label {
  font-size: 9px;
  opacity: 0.85;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.store-name {
  font-size: 14px;
  font-weight: 600;
}

/* ── Mobile / Embed compact layout ── */
@media (max-width: 768px) {
  html { overflow: hidden; height: 100%; }
  body {
    padding: 0;
    overflow: hidden;
    height: 100%;
  }

  .series-player {
    width: 100%;
    height: 100vh;
    max-height: 700px;
    border-radius: 0;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header: always horizontal, compact */
  .series-header {
    gap: 16px;
    padding: 16px 20px;
    flex-shrink: 0;
  }
  .series-cover {
    width: 110px;
    height: 110px;
    border-radius: 12px;
  }
  .series-cover.no-image { font-size: 40px; }
  .series-info { min-width: 0; gap: 2px; }
  .series-label { font-size: 9px; letter-spacing: 2px; }
  .series-title { font-size: clamp(18px, 3vw, 26px); }
  .series-creator { font-size: 14px; }
  .series-description {
    font-size: 12px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin: 2px 0 0;
  }
  .series-meta { font-size: 11px; }
  .series-actions { margin-top: 8px; gap: 10px; }
  .save-btn { padding: 6px 14px; font-size: 12px; }
  .plus-icon { width: 16px; height: 16px; font-size: 12px; }
  .open-btn { width: 32px; height: 32px; }
  .open-btn img { width: 16px; height: 16px; }

  /* Hide store buttons on mobile — save vertical space */
  .store-buttons { display: none; }

  /* Player bar: grid layout, no wrapping */
  .player-bar {
    margin: 0 20px;
    padding: 12px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 6px 10px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: nowrap;
  }
  .player-meta {
    grid-column: 1; grid-row: 1;
    min-width: 0;
    flex: unset;
  }
  .now-playing-title {
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .now-playing-artist { font-size: 11px; }
  .play-circle {
    grid-column: 2; grid-row: 1;
    width: 44px; height: 44px;
    margin-left: 0;
    box-shadow: 0 6px 14px rgba(0,0,0,0.18);
  }
  .play-circle svg { width: 16px; height: 16px; }
  .player-controls {
    grid-column: 1 / -1; grid-row: 2;
    flex: unset;
    flex-wrap: nowrap;
    gap: 6px;
  }
  .progress-container { min-width: 0; }
  .time-row { font-size: 10px; justify-content: space-between; }

  /* Chapter list: fill remaining space, scroll internally */
  .chapter-list {
    flex: 1;
    min-height: 0;
    max-height: none;
    padding: 6px 0 10px;
  }
  .chapter-list-header {
    grid-template-columns: 32px 1fr 56px;
    padding: 0 20px 6px;
    font-size: 9px;
  }
  .chapter-item {
    grid-template-columns: 32px 1fr 56px;
    padding: 10px 20px;
    gap: 6px;
  }
  .chapter-number { font-size: 13px; }
  .chapter-title { font-size: 14px; }
  .chapter-subtitle { font-size: 11px; }
  .chapter-duration { font-size: 11px; }
}

/* Extra small screens */
@media (max-width: 420px) {
  .series-header { gap: 12px; padding: 12px 14px; }
  .series-cover { width: 80px; height: 80px; }
  .series-title { font-size: 16px; }
  .player-bar { margin: 0 14px; }
  .chapter-list-header,
  .chapter-item { padding-left: 14px; padding-right: 14px; }
}
</style>
</head>
<body>
<div id="app" class="loading">
  <div class="loading-spinner"></div>
  <div>Loading series...</div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<audio id="audioPlayer"></audio>

<script>
// Configuration
const SUPABASE_URL = 'https://vrcshstpoimwpwyyamvq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyY3Noc3Rwb2ltd3B3eXlhbXZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU2MTg4NzEsImV4cCI6MjA3MTE5NDg3MX0.yAJbFPzYTGLwSZFOAVRukwXyNQQ69cdVYwYWvRAkUNc';

// Parse URL parameters
const params = new URLSearchParams(window.location.search);
const seriesId = params.get('id');
const autoplay = params.get('autoplay') === 'true';

// State
let audio = null;
let currentSeriesData = null;
let currentChapters = [];
let currentChapterIndex = -1;
let isDragging = false;

// Fade-in on load
window.addEventListener('load', () => document.body.classList.add('loaded'));

// Validation
if (!seriesId || seriesId.length !== 36) {
  document.getElementById('app').innerHTML = '<div class="error">This content is no longer available</div>';
  document.body.classList.add('loaded');
  throw new Error('Invalid series ID');
}

// Helpers
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatWithCommas(num) {
  return num?.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') || '0';
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  return date.getFullYear();
}

function refreshSeriesStats() {
  if (!currentSeriesData) return;
  const statsEl = document.getElementById('seriesStats');
  if (!statsEl) return;
  const totalListens = currentChapters.reduce((sum, ch) => sum + (ch.listens_count || 0), 0);
  const year = formatDate(currentSeriesData.created_at);
  const duration = formatTime(currentSeriesData.total_duration || 0);
  statsEl.textContent = `${year} · ${currentChapters.length} chapters · ${duration} · ${formatWithCommas(totalListens)} listens`;
}

function getInitials(name) {
  return name?.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
}

// Main
async function loadSeries() {
  const app = document.getElementById('app');
  try {
    // Fetch series
    const seriesRes = await fetch(
      `${SUPABASE_URL}/rest/v1/series?id=eq.${seriesId}&select=*`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!seriesRes.ok) throw new Error('Failed to fetch series');
    const series = await seriesRes.json();
    if (!series || series.length === 0) {
      app.innerHTML = '<div class="error">This content is no longer available</div>';
      document.body.classList.add('loaded');
      return;
    }
    currentSeriesData = series[0];

    // Fetch creator
    let creator = { handle: 'anonymous', display_name: 'Anonymous' };
    if (currentSeriesData.user_id) {
      const userRes = await fetch(
        `${SUPABASE_URL}/rest/v1/users?id=eq.${currentSeriesData.user_id}&select=*`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const users = await userRes.json();
      if (users && users.length > 0) creator = users[0];
    }

    // Fetch chapters (posts in this series)
    const chaptersRes = await fetch(
      `${SUPABASE_URL}/rest/v1/posts?series_id=eq.${seriesId}&select=*&order=chapter_number.asc`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!chaptersRes.ok) throw new Error('Failed to fetch chapters');
    const chapters = await chaptersRes.json();
    currentChapters = chapters || [];

    // Calculate total stats
    const totalListens = currentChapters.reduce((sum, ch) => sum + (ch.listens_count || 0), 0);

    const seriesYear = formatDate(currentSeriesData.created_at);

    // Render
    app.innerHTML = `
      <div class="series-player">
        <div class="series-header">
          <div class="series-cover ${currentSeriesData.cover_image_url ? '' : 'no-image'}">
            ${currentSeriesData.cover_image_url ? `<img src="${currentSeriesData.cover_image_url}" alt="${currentSeriesData.title}">` : '🎙️'}
          </div>
          <div class="series-info">
            <p class="series-label">Series</p>
            <h1 class="series-title">${currentSeriesData.title || 'Untitled Series'}</h1>
            <p class="series-creator">${creator.display_name || creator.handle}</p>
            ${currentSeriesData.description ? `<p class="series-description">${currentSeriesData.description}</p>` : ''}
            <p class="series-meta" id="seriesStats">${seriesYear} · ${currentChapters.length} chapters · ${formatTime(currentSeriesData.total_duration || 0)} · ${formatWithCommas(totalListens)} listens</p>
            <div class="series-actions">
              <button type="button" class="save-btn" id="shareBtn">
                <span class="plus-icon">+</span>
                Save on Gistvox
              </button>
              <button type="button" class="open-btn" id="openInAppBtn" aria-label="Open in Gistvox">
                <img src="https://vrcshstpoimwpwyyamvq.supabase.co/storage/v1/object/public/gistvox-public/gistvox-logo.png" alt="Gistvox">
              </button>
            </div>
            <div class="store-buttons">
              <a href="https://apps.apple.com/app/gistvox/id6738029795" target="_blank" rel="noopener noreferrer" class="store-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                <span class="store-text">
                  <span class="store-label">Download on the</span>
                  <span class="store-name">App Store</span>
                </span>
              </a>
              <a href="https://play.google.com/store/apps/details?id=com.gistvox.app&hl=en" target="_blank" rel="noopener noreferrer" class="store-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                </svg>
                <span class="store-text">
                  <span class="store-label">Get it on</span>
                  <span class="store-name">Google Play</span>
                </span>
              </a>
            </div>
          </div>
        </div>

        <div class="player-bar hidden" id="playerBar">
          <div class="player-meta">
            <div class="player-meta-label">Now playing</div>
            <div class="now-playing-title" id="nowPlayingTitle">Nothing playing</div>
            <div class="now-playing-artist" id="nowPlayingArtist">${creator.display_name || creator.handle}</div>
          </div>
          <div class="player-controls">
            <button class="ghost-btn" id="prevBtn" aria-label="Previous">
              <svg fill="currentColor" viewBox="0 0 16 16">
                <path d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7z"/>
              </svg>
            </button>
            <div class="progress-container" id="progressContainer">
              <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
              </div>
              <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
              </div>
            </div>
            <button class="ghost-btn" id="nextBtn" aria-label="Next">
              <svg fill="currentColor" viewBox="0 0 16 16">
                <path d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.712v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7z"/>
              </svg>
            </button>
            <button class="ghost-btn dots-btn" id="moreBtn" aria-label="Copy link">
              <svg fill="currentColor" viewBox="0 0 16 16">
                <path d="M3 9a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5 0a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
              </svg>
            </button>
          </div>
          <button class="play-circle" id="playPauseBtn" aria-label="Play or pause">
            <svg fill="currentColor" viewBox="0 0 24 24" id="playIcon">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg fill="currentColor" viewBox="0 0 24 24" id="pauseIcon" style="display:none">
              <rect x="6" y="5" width="4" height="14" rx="2"/>
              <rect x="14" y="5" width="4" height="14" rx="2"/>
            </svg>
          </button>
        </div>

        <div class="chapter-list">
          <div class="chapter-list-header">
            <span>#</span>
            <span>Title</span>
            <span>Time</span>
          </div>
          ${currentChapters.map((chapter, index) => `
            <div class="chapter-item" data-index="${index}" onclick="playChapter(${index})">
              <div class="chapter-number">${chapter.chapter_number || index + 1}</div>
              <div class="chapter-info">
                <div class="chapter-title">${chapter.chapter_title || chapter.title || 'Untitled Chapter'}</div>
                <div class="chapter-subtitle">${creator.display_name || creator.handle}</div>
              </div>
              <div class="chapter-duration">${formatTime(chapter.audio_duration || 0)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    setupEventListeners();
    refreshSeriesStats();
    document.body.classList.add('loaded');

    if (autoplay && currentChapters.length > 0) {
      playChapter(0);
    }

  } catch (error) {
    console.error('Series player error:', error);
    app.innerHTML = '<div class="error">This content is no longer available</div>';
    document.body.classList.add('loaded');
  }
}

function setupEventListeners() {
  const shareBtn = document.getElementById('shareBtn');
  const moreBtn = document.getElementById('moreBtn');
  const openBtn = document.getElementById('openInAppBtn');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressContainer = document.getElementById('progressContainer');

  if (shareBtn) shareBtn.addEventListener('click', handleShare);
  if (moreBtn) moreBtn.addEventListener('click', handleShare);
  if (openBtn) openBtn.addEventListener('click', openInApp);
  playPauseBtn.addEventListener('click', togglePlayPause);
  prevBtn.addEventListener('click', playPrevious);
  nextBtn.addEventListener('click', playNext);

  // Progress bar interactions
  progressContainer.addEventListener('click', handleProgressClick);
  progressContainer.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', doDrag);
  document.addEventListener('mouseup', endDrag);
}

function playChapter(index) {
  if (index < 0 || index >= currentChapters.length) return;
  
  currentChapterIndex = index;
  const chapter = currentChapters[index];
  
  if (!audio) {
    audio = document.getElementById('audioPlayer');
    setupAudioPlayer();
  }

  // Update UI
  document.querySelectorAll('.chapter-item').forEach((item, i) => {
    item.classList.toggle('playing', i === index);
  });

  // Update now playing
  document.getElementById('nowPlayingTitle').textContent = chapter.chapter_title || chapter.title || 'Untitled Chapter';
  document.getElementById('playerBar').classList.remove('hidden');

  // Load and play
  audio.src = chapter.audio_url;
  audio.load();
  audio.play();

  // Track listen
  trackChapterListen(chapter.id);
}

function setupAudioPlayer() {
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const progressFill = document.getElementById('progressFill');

  audio.addEventListener('play', () => {
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
  });

  audio.addEventListener('pause', () => {
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  });

  audio.addEventListener('loadedmetadata', () => {
    if (isFinite(audio.duration)) {
      durationEl.textContent = formatTime(audio.duration);
    }
  });

  audio.addEventListener('timeupdate', () => {
    if (!isDragging && audio.duration) {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }
  });

  audio.addEventListener('ended', () => {
    playNext();
  });
}

function togglePlayPause() {
  if (!audio || !audio.src) {
    if (currentChapters.length) {
      const indexToPlay = currentChapterIndex === -1 ? 0 : currentChapterIndex;
      playChapter(indexToPlay);
    }
    return;
  }
  audio.paused ? audio.play() : audio.pause();
}

function playPrevious() {
  if (currentChapterIndex > 0) {
    playChapter(currentChapterIndex - 1);
  }
}

function playNext() {
  if (currentChapterIndex < currentChapters.length - 1) {
    playChapter(currentChapterIndex + 1);
  }
}

function handleProgressClick(e) {
  if (!audio || !audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = ((e.clientX - rect.left) / rect.width) * 100;
  audio.currentTime = (percent / 100) * audio.duration;
  document.getElementById('progressFill').style.width = `${percent}%`;
}

let dragStartX = 0;
function startDrag(e) {
  if (!audio || !audio.duration) return;
  isDragging = true;
  dragStartX = e.clientX;
}

function doDrag(e) {
  if (!isDragging || !audio || !audio.duration) return;
  const rect = document.getElementById('progressContainer').getBoundingClientRect();
  const percent = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
  document.getElementById('progressFill').style.width = `${percent}%`;
  document.getElementById('currentTime').textContent = formatTime((percent / 100) * audio.duration);
}

function endDrag() {
  if (!isDragging) return;
  isDragging = false;
  const percent = parseFloat(document.getElementById('progressFill').style.width);
  if (audio && audio.duration) {
    audio.currentTime = (percent / 100) * audio.duration;
  }
}

function openInApp() {
  const branchLink = `https://gistvox.app.link/series/${seriesId}`;
  window.open(branchLink, '_blank');
}

async function trackChapterListen(postId) {
  const sessionKey = `gistvox_listened_${postId}`;
  if (sessionStorage.getItem(sessionKey)) return;
  
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/track_embed_listen`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_post_id: postId })
    });
    
    if (response.ok) {
      const result = await response.json();
      const updatedCount = typeof result?.count === 'number' ? result.count : null;
      const index = currentChapters.findIndex((chapter) => chapter.id === postId);
      if (updatedCount !== null && index !== -1) {
        currentChapters[index].listens_count = updatedCount;
      }
      sessionStorage.setItem(sessionKey, 'true');
      refreshSeriesStats();
    }
  } catch (error) {
    console.error('Error tracking listen:', error);
  }
}

function handleShare() {
  const shareUrl = `https://embed.gistvox.com/series?id=${seriesId}`;
  
  const write = async () => {
    try {
      if (navigator.share) {
        try {
          await navigator.share({ 
            url: shareUrl, 
            title: currentSeriesData.title, 
            text: `Listen to ${currentSeriesData.title} on Gistvox` 
          });
          return true;
        } catch {
          // fall through to clipboard
        }
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(shareUrl);
        return true;
      }
      const ta = document.createElement('textarea');
      ta.value = shareUrl;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch {
      return false;
    }
  };

  write().then((ok) => {
    if (ok) {
      showToast('Link copied to clipboard');
    } else {
      window.open(shareUrl, '_blank');
      showToast('Opening link...');
    }
  });
}

function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  if (toast._hideTimer) clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

// Make functions globally accessible
window.playChapter = playChapter;

// Load series
loadSeries();
</script>
