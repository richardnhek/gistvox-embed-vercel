<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gistvox Series Embed</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .embed-wrapper {
      position: relative;
      width: 100%;
      height: 700px;
      overflow: visible;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="embed-wrapper">
      <iframe 
        src="series.html?id=87c3c876-22b7-4942-9a50-355e1453afff&autoplay=false"
        allow="autoplay; clipboard-write"
        loading="lazy"
        title="Gistvox Series Player">
      </iframe>
    </div>
  </div>
</body>
</html>
